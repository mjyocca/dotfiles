cpu: 4
memory: 12
disk: 100

# Immutable after profile creation
arch: host
runtime: docker
vmType: vz
mountType: virtiofs
# Immutable after profile creation

modelRunner: docker
autoActivate: true
mountInotify: true

network:
  dnsHosts:
    host.docker.internal: host.lima.internal

docker:
  features:
    buildkit: true

provision:
  - mode: system
    script: |
      sysctl -w fs.inotify.max_user_watches=1048576
      sysctl -w fs.inotify.max_queued_events=1048576
      sysctl -w fs.inotify.max_user_instances=1024

mounts:
  # Scope mounts to specific directories rather than all of /Users.
  # Mounting /Users grants every process in the VM read/write access to
  # all home directories on the host, including ~/.ssh, ~/.aws, etc.
  #
  # Adjust these paths to match your actual project locations.
  # Mounts are mutable — edit the profile config at ~/.colima/<profile>/colima.yaml
  # after creation to add or change mount paths without recreating the VM.
  # - location: ~/code
  #   writable: true
  - location: /Volumes
    writable: true
  - location: /opt/homebrew
    writable: false
  - location: /private
    writable: true
  - location: /var/folders
    writable: true
